  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <!-- Header -->
  <header class="flex justify-between items-center p-4">
      <div class="flex items-center gap-2">
  <div class="w-10 h-10 rounded-xl bg-black dark:bg-white flex items-center justify-center">
    <span class="text-white dark:text-black font-bold text-lg">M</span>
  </div>
    <!-- Header Logo and Telegram link -->
<div class="flex items-center gap-4">
  <!-- Telegram icon + link -->
  <a href="https://t.me/wxlyan" target="_blank" class="flex items-center gap-2 text-blue-500 font-bold">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram" class="w-6 h-6">
    @wxlyan
  </a>
</div>
    
    <div class="flex items-center gap-4">
      <button id="theme-toggle" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-full"> 🌗 </button>
      <a href="https://t.me/wxlyan" target="_blank" class="text-blue-500 text-lg"
    </div>
  </header>

  <!-- Main Content -->
  <main class="p-4 space-y-6">
    <!-- 1. English Script Input -->
    <div>
      <label class="block font-semibold mb-1">1. English Script ထည့်ပါ ✨</label>
      <textarea id="english-script" rows="3" class="w-full p-2 border rounded-md" placeholder="Type your English script here..."></textarea>
    </div>

    <!-- 2. AI Myanmar Script Output -->
    <div>
      <label class="block font-semibold mb-1">2. မြန်မာ Script (AI ပြောင်းပြီး) ✨</label>
      <div id="ai-script" class="p-3 border rounded-md bg-purple-50 text-purple-900 min-h-[60px]"></div>
    </div>

    <!-- 3. Refined Myanmar Script (User Editable) -->
    <div>
      <label class="block font-semibold mb-1">3. သဘာဝလေသံ မြန်မာ Script ✨</label>
      <textarea id="refined-script" rows="3" class="w-full p-2 border rounded-md" placeholder="Edit script for natural voice..."></textarea>
    </div>

    <!-- 4. TTS Player -->
    <div>
      <label class="block font-semibold mb-1">4. မြန်မာအသံ (Natural Voice) ✨</label>
      <div class="border rounded-md p-3 bg-gray-100 dark:bg-gray-800">
        <audio id="tts-audio" controls class="w-full"></audio>
        <div class="mt-2 flex gap-2">
          <button class="p-2 bg-purple-500 text-white rounded">Regenerate</button>
          <button class="p-2 bg-green-500 text-white rounded">Download</button>
        </div>
      
    </div>
  </main>
<!-- Step 3 & Step 4 Script – English → Myanmar + Refined Script + TTS Placeholder -->

  <script src="script.js"></script>
</body>
</html>
