<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.Voice</title>
  <link rel="icon" href="favicon.png">
  <link href="https://cdn.tailwindcss.com" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">
  <!-- Header -->
<header class="flex justify-between items-center p-4">
  <div class="flex items-center gap-2">
    <span class="text-black dark:text-white font-bold text-2xl">M.Voice</span>
  </div>

  <!-- Telegram & Theme Toggle -->
  <div class="flex items-center gap-4">
    <a href="https://t.me/wxlyan" target="_blank" class="flex items-center gap-2">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram" class="w-6 h-6">
      @wxlyan
    </a>
    <button id="theme-toggle" class="px-3 py-1 border rounded text-gray-800 dark:text-gray-200 border-gray-400 dark:border-gray-600">
      Theme
    </button>
  </div>
</header>
<main class="p-4 space-y-6">
  <!-- English Script Input -->
  <div>
    <label class="block font-semibold mb-1">1. English Script ✨</label>
    <textarea id="english-script" rows="3" class="w-full p-2 border rounded-md" placeholder="Type your English script here..."></textarea>
  </div>

  <!-- AI Myanmar Script Output -->
  <div>
    <label class="block font-semibold mb-1">2. မြန်မာ Script (AI ပြန်ပြောမှု) ✨</label>
    <div id="ai-script" class="p-3 border rounded-md bg-purple-50 text-purple-900 min-h-[60px]"></div>
  </div>

  <!-- Refined Myanmar Script -->
  <div>
    <label class="block font-semibold mb-1">3. သဘာဝလို့ မြန်မာ Script ✨</label>
    <textarea id="refined-script" rows="3" class="w-full p-2 border rounded-md" placeholder="Edit script for natural voice..."></textarea>
  </div>

  <!-- TTS Player -->
  <div>
    <label class="block font-semibold mb-1">4. မြန်မာအသံ (Natural Voice) ✨</label>
    <audio id="tts-audio" controls class="w-full"></audio>
    <div class="mt-2 flex gap-2">
      <button class="p-2 bg-purple-500 text-white rounded" id="regenerate-btn">Regenerate</button>
      <button class="p-2 bg-green-500 text-white rounded" id="download-btn">Download</button>
    </div>
  </div>
</main>
<script>
  // Theme toggle
  const themeToggle = document.getElementById('theme-toggle');
  themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark');
  });

  // TTS
  const regenerateBtn = document.getElementById('regenerate-btn');
  const refinedScript = document.getElementById('refined-script');
  const ttsAudio = document.getElementById('tts-audio');

  regenerateBtn.addEventListener('click', () => {
    const text = refinedScript.value.trim();
    if(!text) return alert('Please enter text');

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'my-MM';
    utterance.rate = 1;
    utterance.pitch = 1;
    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
  });

  // Download audio placeholder (replace with API call for real TTS)
  const downloadBtn = document.getElementById('download-btn');
  downloadBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
    a.download = 'MVoice_output.mp3';
    a.click();
  });
</script>
</body>
</html>
